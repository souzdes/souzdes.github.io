<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>Denise Souza | Psicóloga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --rose-principal: #B78A8A;
      --rose-claro: #F1E7E5;
      --bege-rosado: #E5D8D4;
      --off-white: #FAF7F6;
      --texto: #2F3437;
      --texto-secundario: #6B7280;
      --destaque: #9A6F6F;
      --grafite: #1F2933;
      --branco: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--off-white);
      color: var(--texto);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(
        135deg,
        #F3E8E6 0%,
        #EAD9D7 100%
      );
      color: var(--grafite);
      text-align: center;
      padding: 3rem 1rem 2rem;
      animation: fadeIn 1s ease-in-out;
      border-bottom: 1px solid var(--bege-rosado);
    }

    header h1 {
      font-size: 4rem;
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--grafite);
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.05rem;
      margin-top: 0.3rem;
      color: var(--destaque);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .intro-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 2rem;
      gap: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      flex-grow: 1;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .card {
      background-color: var(--branco);
      width: 320px;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      border: 1px solid #E7DFDC;
      box-shadow: 0 8px 24px rgba(31, 41, 51, 0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 28px rgba(31, 41, 51, 0.10);
    }

    .card-title {
      font-size: 1.1rem;
      color: var(--grafite);
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .card-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }

    .card-content.show {
      max-height: 300px;
      margin-top: 0.5rem;
    }

    .card-content a {
      text-decoration: none;
      color: #8B5E5E;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .card-content a:hover {
      text-decoration: underline;
      color: var(--grafite);
    }

    footer {
      background-color: #EFE6E4;
      padding: 1.5rem 1rem 2rem;
      color: var(--destaque);
      text-align: center;
      font-size: 0.9rem;
      border-top: 1px solid var(--bege-rosado);
    }

    .footer-icons {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .footer-icons a {
      color: var(--destaque);
      text-decoration: none;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .footer-icons a:hover {
      color: var(--grafite);
      transform: translateY(-2px);
    }

    .icon-envelope,
    .icon-github,
    .icon-linkedin {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 3rem;
      }

      .intro-section {
        flex-direction: column;
        padding: 2rem 1rem;
      }

      .cards {
        align-items: center;
        width: 100%;
      }

      .card {
        width: 100%;
        max-width: 340px;
      }
    }
  </style>
</head>

<body>

    © 2026 Denise Souza. Todos os direitos reservados.
  </footer>

  <script>
    function toggleCard(clickedCard) {
      const allCards = document.querySelectorAll('.card');

      allCards.forEach(card => {
        const content = card.querySelector('.card-content');
        if (card !== clickedCard) {
          content.classList.remove('show');
        }
      });

      const clickedContent = clickedCard.querySelector('.card-content');
      clickedContent.classList.toggle('show');
    }
  </script>

</body>
</html>
